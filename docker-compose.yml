services:
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - xray-logs:/var/log/xray
    environment:
      - XRAY_LOCATION_ASSET=/usr/local/share/xray
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "443"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=vpndb
      - DB_USER=vpnuser
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - XRAY_CONFIG_PATH=/xray/config.json
      - XRAY_API_ADDR=${XRAY_API_ADDR}
      - DOMAIN=${DOMAIN}
      - REALITY_PUBLIC_KEY=${REALITY_PUBLIC_KEY}
      - REALITY_SHORT_ID=${REALITY_SHORT_ID}
      - SUPERADMIN_LOGIN=${SUPERADMIN_LOGIN}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    volumes:
      - ./xray/config.json:/xray/config.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=http://api:3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=vpndb
      - DB_USER=vpnuser
      - DB_PASSWORD=${DB_PASSWORD}
      - DOMAIN=${DOMAIN}
      - REALITY_PUBLIC_KEY=${REALITY_PUBLIC_KEY}
      - REALITY_SHORT_ID=${REALITY_SHORT_ID}
      - SUPERADMIN_LOGIN=${SUPERADMIN_LOGIN}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, pathlib; sys.exit(0 if pathlib.Path('/tmp/bot.ready').exists() else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vpndb
      - POSTGRES_USER=vpnuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnuser -d vpndb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      xray:
        condition: service_healthy
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pg-data:
  xray-logs:

networks:
  vpn-net:
    driver: bridge
